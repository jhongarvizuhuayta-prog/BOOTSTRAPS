<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 7 - Carousel Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header-carousel {
            background-color: #212529;
            color: white;
            padding: 40px;
            border-bottom: 4px solid #0dcaf0; /* Línea de acento cyan */
        }
        /* Ajuste de altura para que las imágenes no se deformen */
        .carousel-item img {
            height: 500px;
            object-fit: cover; /* Recorta la imagen para llenar el espacio */
            filter: brightness(0.7); /* Oscurece un poco la imagen para que el texto resalte */
        }
        .carousel-caption {
            bottom: 20%;
            background: rgba(0, 0, 0, 0.4); /* Fondo semi-transparente para el texto */
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4 shadow-lg p-0 bg-white overflow-hidden" style="border-radius: 20px;">
    <div class="header-carousel text-center">
        <h1 class="display-3 fw-bold">Actividad 7</h1>
        <h2 class="fw-light">Carousel (Imágenes en línea)</h2>
    </div>

    <div id="miCarrusel" class="carousel slide" data-bs-ride="carousel">
        
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="3000">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=1200&h=500&auto=format&fit=crop" class="d-block w-100" alt="Tecnología">
                <div class="carousel-caption">
                    <h3 class="fw-bold">First slide label</h3>
                    <p>Explorando nuevas fronteras en el desarrollo web moderno.</p>
                </div>
            </div>

            <div class="carousel-item" data-bs-interval="3000">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&h=500&auto=format&fit=crop" class="d-block w-100" alt="Programación">
                <div class="carousel-caption">
                    <h3 class="fw-bold">Second slide label</h3>
                    <p>Interfaces responsivas diseñadas con Bootstrap 5.</p>
                </div>
            </div>

            <div class="carousel-item" data-bs-interval="3000">
                <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=1200&h=500&auto=format&fit=crop" class="d-block w-100" alt="Código">
                <div class="carousel-caption">
                    <h3 class="fw-bold">Third slide label</h3>
                    <p>Optimización y feedback constante en cada línea de código.</p>
                </div>
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
