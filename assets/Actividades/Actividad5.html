<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 5 - Formularios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header-black {
            background-color: #212529;
            color: white;
            padding: 30px;
            margin-bottom: 20px;
        }
        label { font-weight: 500; margin-bottom: 5px; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4 shadow bg-white p-0">
    <div class="header-black text-center">
        <h1 class="display-3">Actividad 5</h1>
        <h2 class="fw-light">Formularios</h2>
    </div>

    <form class="p-4 row g-3">
        
        <div class="col-md-4">
            <label class="form-label">First name</label>
            <input type="text" class="form-control is-valid" value="Marco" required>
            <div class="valid-feedback">Bien!</div>
        </div>

        <div class="col-md-4">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control is-valid" value="Escalera" required>
            <div class="valid-feedback">Bien!</div>
        </div>

        <div class="col-md-4">
            <label class="form-label">Username</label>
            <div class="input-group has-validation">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control is-invalid" value="dfasdfas" required>
                <div class="invalid-feedback">Por favor elija un nombre de usuario.</div>
            </div>
        </div>

        <div class="col-md-6">
            <label class="form-label">Direccion</label>
            <input type="text" class="form-control is-invalid" value="dfasdfas" required>
            <div class="invalid-feedback">Por favor, proporcione una dirección válida.</div>
        </div>

        <div class="col-md-3">
            <label class="form-label">Departamento</label>
            <select class="form-select is-invalid" required>
                <option selected disabled>Oruro</option>
            </select>
            <div class="invalid-feedback">Por favor, seleccione un departamento.</div>
        </div>

        <div class="col-md-3">
            <label class="form-label">Telefono</label>
            <input type="number" class="form-control is-invalid" value="4345345" required>
            <div class="invalid-feedback">Por favor ingrese un telefono valido.</div>
        </div>

        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input is-invalid" type="checkbox" checked required>
                <label class="form-check-label text-danger">Acepte los terminos y condiciones</label>
                <div class="invalid-feedback">Debes aceptar antes de enviar</div>
            </div>
        </div>

        <div class="col-12">
            <button class="btn btn-primary px-4" type="submit">Enviar Formulario</button>
        </div>
    </form>
</div>

</body>
</html>
