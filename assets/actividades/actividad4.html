<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 4 - Alerts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajuste para que las alertas se vean más delgadas y juntas como en la imagen */
        .alert {
            margin-bottom: 0.5rem; /* Espacio pequeño entre alertas */
            border-radius: 0;      /* Bordes rectos como se ve en la imagen */
        }
        .header-black {
            background-color: #212529; /* Color gris muy oscuro/negro */
            color: white;
            padding: 40px 20px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-4 shadow-sm bg-white p-0">
        <div class="header-black text-center">
            <h1 style="font-size: 3.5rem; font-weight: 300;">Actividad 4</h1>
            <p style="font-size: 1.5rem; font-weight: 300;">Mensajes contextuales para feedback.</p>
        </div>

        <div class="p-3">
            <div class="alert alert-primary" role="alert">
                A simple primary alert—check it out!
            </div>

            <div class="alert alert-secondary" role="alert">
                A simple secondary alert—check it out!
            </div>

            <div class="alert alert-success" role="alert">
                A simple success alert—check it out!
            </div>

            <div class="alert alert-danger" role="alert">
                A simple danger alert—check it out!
            </div>

            <div class="alert alert-warning" role="alert">
                A simple warning alert—check it out!
            </div>

            <div class="alert alert-info" role="alert">
                A simple info alert—check it out!
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
